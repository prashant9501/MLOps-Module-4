# ============================================================
# SBERT News Search -- Docker Compose Starter
# Module 4 Branch Project
#
# YOUR TASK: Complete the 2 TODOs below.
#
# Usage (after completing):
#   docker compose -f docker-compose.starter.yml up --build
#
# This will:
#   1. Build the Docker image from your Dockerfile
#   2. Start the search API container
#   3. Make it accessible at http://localhost:5001
# ============================================================

services:
  search-api:
    build:
      dockerfile: ./Dockerfile
      context: ./
    container_name: sbert-search-api

    # TODO 1: Map port 5001 on your host machine to port 5001 in the container
    # ──────────────────────────────────────────────────────────────────────
    # This allows you to access the API at http://localhost:5001 from your
    # browser or curl. Format: "host_port:container_port"
    #
    # Hint:
    #   ports:
    #     - "5001:5001"
    # ──────────────────────────────────────────────────────────────────────

    # TODO 2: Mount the current directory as /app inside the container
    # ──────────────────────────────────────────────────────────────────────
    # A volume mount maps a folder on your host to a folder in the container.
    # This means changes to your local files (e.g., editing server.py) are
    # immediately visible inside the container without rebuilding the image.
    # Format: "host_path:container_path"
    #
    # Hint:
    #   volumes:
    #     - ".:/app"
    # ──────────────────────────────────────────────────────────────────────

    # The command to run when the container starts
    command: ["python", "server.py"]
